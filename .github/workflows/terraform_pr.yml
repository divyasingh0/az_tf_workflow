
name: Terraform PR Workflow

on:
  workflow_call:
    inputs:
      environment:
        description: "Terraform environment"
        required: true
        type: string

      working_directory:
        description: "Terraform working directory"
        required: false
        default: .
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:

  validate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Secret Presence
        run: |
          echo "CLIENT_ID_PRESENT=${{ secrets.AZURE_CLIENT_ID != '' }}"
          echo "TENANT_ID_PRESENT=${{ secrets.AZURE_TENANT_ID != '' }}"
          echo "SUBSCRIPTION_ID_PRESENT=${{ secrets.AZURE_SUBSCRIPTION_ID != '' }}"

      - name: Read Terraform Version
        id: tf_version
        run: echo "version=$(cat .terraform-version)" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tf_version.outputs.version }}

      - name: Validate Environment Files
        run: |
          test -f environment/${{ inputs.environment }}/backend.tfvars
          test -f environment/${{ inputs.environment }}/${{ inputs.environment }}.tfvars

      - name: Terraform Init
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          terraform init -backend=false -input=false

      - name: Terraform FMT
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

  plan:
    needs: validate

    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Terraform Version
        id: tf_version
        run: echo "version=$(cat .terraform-version)" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tf_version.outputs.version }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          terraform init -input=false
          # terraform init -backend-config=environment/${{ inputs.environment }}/backend.tfvars -input=false

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file=environment/${{ inputs.environment }}/${{ inputs.environment }}.tfvars \
            -out=tfplan

      - name: Generate Plan Output
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: |
            tfplan
            tfplan.txt