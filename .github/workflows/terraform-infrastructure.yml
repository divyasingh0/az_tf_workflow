name: Terraform Infrastructure

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:

  terraform:

    runs-on: ubuntu-latest

    environment: prod

    defaults:
      run:
        working-directory: .

    steps:

      #################################################
      # Checkout
      #################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #################################################
      # Terraform Version
      #################################################

      - name: Read Terraform Version
        id: tf_version
        run: |
          echo "version=$(cat .terraform-version)" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tf_version.outputs.version }}

      #################################################
      # Governance Metadata
      #################################################

      - name: Generate Workflow Metadata
        run: |

          MODULE_NAME=$(basename "$PWD")

          cat > workflow.auto.tfvars.json <<EOF
          {
            "workflow_tags": {
              "repository": "${GITHUB_REPOSITORY}",
              "terraform-module": "${MODULE_NAME}",
              "terraform-version": "${{ steps.tf_version.outputs.version }}"
            }
          }
          EOF

      #################################################
      # Terraform Init
      #################################################

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config=environment/prod/backend.tfvars

      #################################################
      # Validation (PR Only)
      #################################################

      - name: Terraform Format Check
        if: github.event_name == 'pull_request'
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        if: github.event_name == 'pull_request'
        run: terraform validate

      #################################################
      # TFLint (PR Only)
      #################################################

      - name: Setup TFLint
        if: github.event_name == 'pull_request'
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint Init
        if: github.event_name == 'pull_request'
        run: tflint --init

      - name: Run TFLint
        if: github.event_name == 'pull_request'
        run: tflint --recursive

      #################################################
      # Checkov (PR Only)
      #################################################

      - name: Checkov Security Scan
        if: github.event_name == 'pull_request'
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          soft_fail: false

      #################################################
      # Azure Login
      #################################################

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      #################################################
      # Terraform Plan (PR Only)
      #################################################

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: |
          terraform plan \
            -var-file=environment/prod/prod.tfvars \
            -out=tfplan

      - name: Generate Plan Output
        if: github.event_name == 'pull_request'
        run: |
          terraform show -no-color tfplan > tfplan.txt

      - name: Upload Plan Artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            tfplan
            tfplan.txt
          retention-days: 30

      #################################################
      # Terraform Apply (Main Branch Only)
      #################################################

      - name: Terraform Apply
        if: github.event_name == 'push'
        run: |
          terraform apply \
            -auto-approve \
            -var-file=environment/prod/prod.tfvars
