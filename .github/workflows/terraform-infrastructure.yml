name: Terraform Application

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

      application_name:
        required: true
        type: string

      working_directory:
        required: false
        type: string
        default: "."

permissions:
  id-token: write
  contents: read

jobs:

  deploy:

    runs-on: ubuntu-latest

    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:

      #################################################
      # Checkout
      #################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      #################################################
      # Build
      #################################################

      - name: Build Application
        run: |
          echo "Building ${{ inputs.application_name }}"

      #################################################
      # Unit Tests
      #################################################

      - name: Run Tests
        run: |
          echo "Running tests"

      #################################################
      # Security Scan
      #################################################

      - name: Dependency Scan
        run: |
          echo "Running security scan"

      #################################################
      # Azure Login
      #################################################

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      #################################################
      # Deploy
      #################################################

      - name: Deploy Application
        run: |
          echo "Deploying ${{ inputs.application_name }} to ${{ inputs.environment }}"
