name: Terraform Infrastructure

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

      action:
        required: true
        type: string

      working_directory:
        required: false
        type: string
        default: "."

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:

  terraform:

    runs-on: ubuntu-latest

    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:

      #################################################
      # Checkout
      #################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      #################################################
      # Terraform Version
      #################################################

      - name: Read Terraform Version
        id: tf_version
        run: |
          echo "version=$(cat .terraform-version)" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tf_version.outputs.version }}

      #################################################
      # Format Validation
      #################################################

      - name: Terraform FMT
        if: inputs.action != 'apply'
        run: terraform fmt -check -recursive

      #################################################
      # Terraform Init
      #################################################

      - name: Terraform Init
        run: |
          terraform init \
          -backend-config=environment/${{ inputs.environment }}/backend.tfvars

      #################################################
      # Terraform Validate
      #################################################

      - name: Terraform Validate
        if: inputs.action != 'apply'
        run: terraform validate

      #################################################
      # TFLint
      #################################################

      - name: Setup TFLint
        if: inputs.action != 'apply'
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint Init
        if: inputs.action != 'apply'
        run: tflint --init

      - name: Run TFLint
        if: inputs.action != 'apply'
        run: tflint --recursive

      #################################################
      # Checkov Security Scan
      #################################################

      - name: Checkov Security Scan
        if: inputs.action != 'apply'
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          soft_fail: false

      #################################################
      # Azure Login
      #################################################

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      #################################################
      # Terraform Plan
      #################################################

      - name: Terraform Plan
        if: inputs.action == 'plan'
        run: |
          terraform plan \
            -var-file=environment/${{ inputs.environment }}/${{ inputs.environment }}.tfvars \
            -out=tfplan

      #################################################
      # Upload Plan
      #################################################

      - name: Upload Plan Artifact
        if: inputs.action == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 30

      #################################################
      # Terraform Apply
      #################################################

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: |
          terraform apply \
            -auto-approve \
            -var-file=environment/${{ inputs.environment }}/${{ inputs.environment }}.tfvars

      
